<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avenx-JS Showcase</title>
    <link rel="stylesheet" href="dist/bundle.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #8be4ff; 
            display: flex; 
            flex-direction: column;
            gap: 2rem;
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 2rem;
        }
        #app-layout {
            display: flex;
            gap: 3rem;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }
    </style>
</head>
<body>
    <div id="app-layout">
        <div id="app"></div>
        <div class="side-panel">
            <div id="source"></div>
            <div id="display"></div>
        </div>
    </div>
    <script src="dist/bundle.js"></script>
</body>
</html>
